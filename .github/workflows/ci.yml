name: CI
on: [push]
jobs:
  tailwindcss-update:
    name: Generate Tailwind CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Tailwind CSS
        uses: ZoeyVid/tailwindcss-update@main
        with:
          input: assets/app-tailwind.css
          output: assets/app.css
          params: ""
      - name: Commit & Push
        run: |
          git add --force assets/app.css
          git config user.name "GitHub"
          git config user.email "noreply@github.com"
          git diff-index --quiet HEAD || git commit -m "ci: tailwindcss-update"
          git push
  lhci:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lighthouse
        uses: shopify/lighthouse-ci-action@v1
        with:
          access_token: ${{ secrets.SHOP_ACCESS_TOKEN }}
          store: ${{ secrets.SHOP_STORE }}
          password: ${{ secrets.SHOP_PASSWORD }}
          lhci_github_app_token: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          product_handle: ${{ secrets.SHOP_PRODUCT_HANDLE }}
          collection_handle: ${{ secrets.SHOP_COLLECTION_HANDLE }}
  check_dawn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: "shopify/dawn"
          path: "./dawn"
      - name: Theme Check
        uses: ./
        id: theme-check-action
        with:
          flags: '--fail-level crash'
          theme_root: './dawn'
  check_dawn_with_flags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: "shopify/dawn"
          path: "./dawn"
      - name: Theme Check
        uses: ./
        id: theme-check-action
        with:
          theme_root: './dawn'
          flags: '--fail-level crash'
  check_dawn_with_version_dev_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: "shopify/dawn"
          path: "./dawn"
          ref: 'v6.0.0'
      - name: Theme Check
        uses: ./
        id: theme-check-action
        with:
          theme_root: './dawn'
          flags: '--fail-level crash'
          version: '3.50.0'
  check_dawn_with_version_theme_check_2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: "shopify/dawn"
          path: "./dawn"
          ref: 'v6.0.0'
      - name: Theme Check
        uses: ./
        id: theme-check-action
        with:
          theme_root: './dawn'
          flags: '--fail-level crash'
          version: '3.55.0'